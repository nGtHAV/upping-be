version: "3.9"

services:
  upping-be:
    build: .
    container_name: upping-be
    restart: unless-stopped
    volumes:
      - upping-data:/app/data
    environment:
      - DB_PATH=/app/data/uptime.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-prod}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@upping.dev}

volumes:
  upping-data:
